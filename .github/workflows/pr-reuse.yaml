name: PR reuse

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: REUSE compliance check
      uses: fsfe/reuse-action@v6
